<!DOCTYPE html>
  <html lang='ko'>
    <head>
      <meta charset='utf-8'>
      <meta name='viewport' content='width=device-width, initial-scale=1'>
      <title>MDeautify · md2pdf</title>
      <link rel="stylesheet" href="css/style.css">
      <script src="vendor/paged.polyfill.js"></script>
      <script src="vendor/marked.min.js"></script>
      <script src="js/diagram.js"></script>

    <body>
      <div id='bar'><span class='brand'><svg class='brand-mark' width='30' height='30' viewBox='0 0 48 48' xmlns='http://www.w3.org/2000/svg' aria-hidden='true'><rect x='1' y='1' width='46' height='46' rx='12' fill='#7c3aed'/><path d='M10 33 V18 L20 28 L30 18 V33' fill='none' stroke='#fff' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/><path d='M36.5 8 C36.5 12.8 38.7 15 43.5 15 C38.7 15 36.5 17.2 36.5 22 C36.5 17.2 34.3 15 29.5 15 C34.3 15 36.5 12.8 36.5 8 Z' fill='#fff'/><path d='M40 20 C40 24 41 25 45 25 C41 25 40 26 40 30 C40 26 39 25 35 25 C39 25 40 24 40 20 Z' fill='#fff' opacity='0.9'/></svg><span class='brand-lock'><span class='brand-title'><span class='m-hi'>MD</span><span class='m-rest'>eautify</span><span class='season'>md2pdf</span></span></span></span><button id='btnOpenTop' title='다른 MD 파일 열기'>MD 파일 열기</button><button id='btnTheme' title='PDF 설정'>PDF 설정</button><span class='spacer'></span><label class='mode-sw' title='다크 모드'><span>다크 모드</span><input type='checkbox' id='tmDark' class='tm-switch'></label><button id='btnPrint'>PDF 저장/인쇄</button><input id='fileInput' type='file' accept='.md,.markdown,.txt' style='display:none'></div><div id='themeModal' hidden><div class='tm-card'><div class='tm-head'><span class='tm-title'>PDF 설정</span><button class='tm-close' id='tmClose' title='닫기'>×</button></div><div id='tm-grid'></div><div class='tm-custom' id='tmCustom'><label for='tmColor'>직접 선택</label><input type='color' id='tmColor' value='#7c3aed'><span class='sw' id='tmSw'></span><span class='tm-hex' id='tmHex'>#7C3AED</span><button type='button' id='tmApply'>적용</button></div><div class='tm-fontsec'><div class='tm-sec-head'><span class='tm-sec-title'>폰트</span></div><div class='tm-font'><label for='tmFont'>본문 폰트</label><select id='tmFont'><option value='noto'>Noto Sans</option><option value='pretendard'>Pretendard</option></select></div><div class='tm-size'><label for='tmSize'>기준 폰트 크기</label><div class='tm-size-ctl'><input type='range' id='tmSize' min='10' max='20' step='1' value='14'><span class='tm-size-val' id='tmSizeVal'>14px</span></div></div></div><div class='tm-foot'><div class='tm-foot-head'><label for='tmFooter'>쪽 바닥글(Footer)</label><input type='checkbox' id='tmFooter' class='tm-switch'></div><div class='tm-foot-body' id='tmFooterBody'><input type='text' id='tmFooterText' placeholder='예: Page {pageNumber} / {totalPages}'><div class='tm-foot-vars'>사용 가능 변수: {pageNumber} , {totalPages}</div><div class='tm-foot-row'><label for='tmFooterAlign'>정렬</label><select id='tmFooterAlign'><option value='left'>왼쪽</option><option value='center'>가운데</option><option value='right'>오른쪽</option></select></div><label class='tm-foot-border'><input type='checkbox' id='tmFooterBorder'>구분선 표시</label></div></div><div class='tm-opts'><div class='tm-opt'><label for='tmRemember'>선택한 설정 기억하기</label><input type='checkbox' id='tmRemember' class='tm-switch'></div></div></div></div><div id='main'><section id='editor'><pre id='raw'></pre></section><div id='splitter'><button id='foldBtn' type='button' title='원본 접기/펼치기' aria-label='원본 접기/펼치기'><span class='fold-ico'>‹</span></button></div><section id='viewer'><div class='pv-head' id='pvHead'>Total 0 pages</div><div id='pages'></div></section><div id='drop'><div class='drop-box'><svg class='drop-ico' width='40' height='40' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round' aria-hidden='true'><path d='M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2'/><path d='M7 9l5 -5l5 5'/><path d='M12 4l0 12'/></svg><h2>여기에 .md 파일을 끌어다 놓으세요</h2><div class='sub'>또는 하단의 <b>MD 파일 열기</b>를 눌러 선택하세요.</div><div class='drop-note'>왼쪽은 마크다운 원본, 오른쪽은 실제 페이지 단위 미리보기입니다.<br>「PDF 저장/인쇄」 → 대상을 PDF로 저장(또는 Microsoft Print to PDF)으로 선택하면 PDF가 만들어집니다.</div><button id='btnOpen'>MD 파일 열기</button></div></div></div><div id='src'></div><script src="js/app.js"></script><script src="js/settings/theme.js"></script><script src="js/settings/font.js"></script><script src="js/settings/size.js"></script><script src="js/settings/footer.js"></script></body></html>
